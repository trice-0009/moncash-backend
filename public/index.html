<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé — PNH Infos Plus</title>
    <meta name="description" content="Portail de paiement sécurisé MonCash pour PNH Infos Plus">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand-blue: #1A3B8E;
            --brand-blue-dark: #12286b;
            --brand-blue-light: #EEF2FF;
            --success: #16a34a;
            --danger: #dc2626;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #dbe4ff 50%, #c7d7fe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 25px 60px rgba(26, 59, 142, .12);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            animation: slideUp .4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .card-header {
            background: linear-gradient(135deg, var(--brand-blue) 0%, #2a52c9 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .logo-img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,.3);
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .card-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.3px;
        }

        .card-header p {
            font-size: .85rem;
            color: rgba(255,255,255,.75);
            margin-top: .25rem;
        }

        /* ── Body ── */
        .card-body { padding: 2rem; }

        /* ── Résumé commande ── */
        .order-summary {
            background: var(--brand-blue-light);
            border: 1px solid #c7d7fe;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            display: none; /* Affiché via JS si params présents */
        }

        .order-summary.visible { display: block; }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .9rem;
            color: var(--text-muted);
            padding: .3rem 0;
        }

        .order-row:last-child {
            border-top: 1px solid #c7d7fe;
            margin-top: .5rem;
            padding-top: .75rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--brand-blue);
        }

        /* ── Bouton payer ── */
        .btn-pay {
            width: 100%;
            background: linear-gradient(135deg, var(--brand-blue) 0%, #2a52c9 100%);
            color: #fff;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            transition: transform .15s, box-shadow .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(26, 59, 142, .35);
        }

        .btn-pay:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26, 59, 142, .4); }
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        .mc-logo { width: 26px; height: 26px; border-radius: 4px; }

        /* ── Loader ── */
        .loader-wrap { text-align: center; padding: 1.5rem 0; display: none; }

        .loader {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid #e5e7eb;
            border-top-color: var(--brand-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: .75rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: .9rem; color: var(--text-muted); }
        .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'} }

        /* ── Message d'erreur ── */
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.25rem;
            display: none;
        }

        .error-box .error-title {
            color: var(--danger);
            font-weight: 700;
            font-size: .9rem;
            margin-bottom: .35rem;
        }

        .error-box .error-detail {
            color: #7f1d1d;
            font-size: .8rem;
            word-break: break-all;
            opacity: .8;
        }

        /* ── Sécurité badges ── */
        .trust-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .75rem;
            color: var(--text-muted);
        }

        /* ── Footer ── */
        .card-footer {
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            text-align: center;
        }

        .card-footer a {
            color: var(--text-muted);
            font-size: .8rem;
            text-decoration: none;
            transition: color .2s;
        }

        .card-footer a:hover { color: var(--brand-blue); }
    </style>
</head>
<body>

<div class="card" role="main">

    <!-- En-tête -->
    <div class="card-header">
        <img src="logo.png" alt="Logo PNH Infos Plus" class="logo-img" id="app-logo">
        <h1>Paiement Sécurisé</h1>
        <p>Portail officiel MonCash · Digicel Haiti</p>
    </div>

    <!-- Corps -->
    <div class="card-body">

        <!-- Résumé de la commande (affiché si params URL présents) -->
        <div class="order-summary" id="order-summary">
            <div class="order-row">
                <span>Pack</span>
                <span id="display-pack">—</span>
            </div>
            <div class="order-row">
                <span>Total à payer</span>
                <strong id="display-amount">—</strong>
            </div>
        </div>

        <!-- Bouton principal -->
        <button class="btn-pay" id="pay-btn" onclick="startRedirectPayment()">
            <img
                src="https://moncashbutton.digicelgroup.com/Moncash-middleware/resources/assets/images/MC_button.png"
                class="mc-logo" alt="MonCash"
                onerror="this.style.display='none'"
            >
            Payer avec MonCash
        </button>

        <!-- Loader -->
        <div class="loader-wrap" id="loader-wrap">
            <div class="loader"></div>
            <p class="status-text">Préparation de la redirection<span class="dots"></span></p>
        </div>

        <!-- Erreur -->
        <div class="error-box" id="error-box">
            <p class="error-title">⚠️ Une erreur est survenue</p>
            <p class="error-detail" id="error-detail"></p>
        </div>

        <!-- Badges de confiance -->
        <div class="trust-bar">
            <span class="trust-item">🔒 Connexion SSL</span>
            <span class="trust-item">🏦 Digicel Officiel</span>
            <span class="trust-item">✅ Paiement sécurisé</span>
        </div>
    </div>

    <!-- Pied de page -->
    <div class="card-footer">
        <a href="privacy.html">Politique de Confidentialité</a>
    </div>
</div>

<script>
    // ─── Lecture des paramètres URL envoyés par l'APK ───
    const params   = new URLSearchParams(window.location.search);
    const amount   = params.get('amount')   || 500;
    const orderId  = params.get('orderId')  || ('ORD_' + Date.now());
    const userId   = params.get('userId')   || null;
    const packName = params.get('packName') || null;

    // Afficher le résumé si les infos sont disponibles
    const summary = document.getElementById('order-summary');
    if (packName || amount) {
        summary.classList.add('visible');
        document.getElementById('display-pack').textContent   = packName || 'Pack Premium';
        document.getElementById('display-amount').textContent = `${parseFloat(amount).toLocaleString('fr')} HTG`;
    }

    // ─── Lancement du paiement ───
    async function startRedirectPayment() {
        const btn       = document.getElementById('pay-btn');
        const loaderWrap = document.getElementById('loader-wrap');
        const errorBox  = document.getElementById('error-box');

        btn.style.display = 'none';
        loaderWrap.style.display = 'block';
        errorBox.style.display   = 'none';

        try {
            const response = await fetch('/createpayment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, orderId, userId, packName }) // packName inclus
            });

            const data = await response.json();

            if (response.ok && data.success && data.redirect_url) {
                // Stocker le cleanOrderId retourné par le serveur (pour vérification APK)
                if (data.orderId) {
                    sessionStorage.setItem('moncash_orderId', data.orderId);
                }
                window.location.href = data.redirect_url;
            } else {
                loaderWrap.style.display = 'none';
                showError(data.error || 'Erreur inconnue.', data.details);
            }

        } catch (e) {
            loaderWrap.style.display = 'none';
            showError('Erreur réseau. Vérifiez votre connexion.', e.message);
        }
    }

    function showError(message, detail) {
        document.getElementById('pay-btn').style.display = 'flex';
        const box = document.getElementById('error-box');
        box.style.display = 'block';
        document.getElementById('error-detail').textContent =
            message + (detail ? ' — ' + (typeof detail === 'object' ? JSON.stringify(detail) : detail) : '');
    }
</script>

</body>
</html>
