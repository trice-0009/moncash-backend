<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Paiement MonCash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2.5rem 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.05); text-align: center; max-width: 400px; width: 90%; }
        .logo-img { width: 100px; height: 100px; margin: 0 auto 1.5rem auto; display: block; border-radius: 50%; }
        .title { font-size: 1.25rem; font-weight: 700; color: #1a202c; margin-bottom: 0.5rem; }
        .subtitle { color: #4a5568; font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
        .btn-pay { width: 100%; background-color: #1A3B8E; color: #fff; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: background 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pay:hover { background-color: #12286b; }
        .btn-pay:active { transform: scale(0.98); }
        .mc-logo { width: 24px; height: 24px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1A3B8E; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0) } 100% { transform: rotate(360deg) } }
        .error { color: #e53e3e; background-color: #fff5f5; padding: 1rem; border-radius: 8px; display: none; margin-top: 1.5rem; font-weight: 600; border: 1px solid #feb2b2; font-size: .85rem; text-align: left; word-break: break-all; }
        #status-text { color: #718096; font-size: 0.9rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="Logo PNH Infos Plus" class="logo-img">
        <h1 class="title">Paiement Sécurisé</h1>
        <p class="subtitle">Cliquez sur le bouton ci-dessous pour payer via le portail officiel MonCash.</p>
        
        <button class="btn-pay" id="pay-btn" onclick="startRedirectPayment()">
            <img src="https://moncashbutton.digicelgroup.com/Moncash-middleware/resources/assets/images/MC_button.png" class="mc-logo" alt="">
            Payer avec MonCash
        </button>

        <div class="loader" id="loader"></div>
        <p id="status-text">Préparation de la redirection...</p>
        <p class="error" id="error-msg"></p>

        <footer style="margin-top: 2rem; border-top: 1px solid #edf2f7; padding-top: 1rem;">
            <a href="privacy.html" style="color: #718096; font-size: 0.8rem; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#4a5568'" onmouseout="this.style.color='#718096'">
                Politique de Confidentialité
            </a>
        </footer>
    </div>

    <script>
        const CREATE_PAYMENT_URL = '/createpayment';

        async function startRedirectPayment() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amount') || 500; 
            const orderId = params.get('orderId') || ("ORD_" + Date.now());
            const userId = params.get('userId'); 

            document.getElementById('pay-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status-text').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';

            try {
                const response = await fetch(CREATE_PAYMENT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, orderId, userId })
                });

                const data = await response.json();

                if (response.ok && data.success && data.redirect_url) {
                    window.location.href = data.redirect_url;
                } else {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('status-text').style.display = 'none';
                    const errorDetails = data.details ? JSON.stringify(data.details) : "";
                    showError((data.error || "Une erreur est survenue.") + " " + errorDetails);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status-text').style.display = 'none';
                showError("Erreur réseau : " + e.message);
            }
        }

        function showError(msg) {
            const err = document.getElementById('error-msg');
            err.style.display = 'block';
            err.innerText = msg;
            document.getElementById('pay-btn').style.display = 'flex';
        }
    </script>
</body>
</html>
