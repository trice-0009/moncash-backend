<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Paiement MonCash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2.5rem 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.05); text-align: center; max-width: 400px; width: 90%; }
        .logo-img { width: 120px; height: 120px; margin: 0 auto 1rem auto; display: block; border-radius: 50%; }
        .subtitle { color: #1a1a1a; font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; font-weight: 500; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1A3B8E; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0) } 100% { transform: rotate(360deg) } }
        #status-text { color: #4a5568; font-size: 1rem; line-height: 1.5; }
        .hint { color: #a0aec0; font-size: .8rem; margin-top: .5rem; display: none; }
        .error { color: #e53e3e; background-color: #fff5f5; padding: 1rem; border-radius: 8px; display: none; margin-top: 1.5rem; font-weight: 600; border: 1px solid #feb2b2; font-size: .85rem; text-align: left; word-break: break-all; }
        .btn-retry { margin-top: 1rem; background-color: #1A3B8E; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: none; }
        .btn-retry:hover { background-color: #12286b; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="Logo PNH Infos Plus" class="logo-img">
        <p class="subtitle">Votre mentor numérique pour intégrer la Police Nationale d'Haïti.</p>
        <p id="status-text">Initialisation du paiement sécurisé...</p>
        <p class="hint" id="hint">⏳ Démarrage du serveur, veuillez patienter...</p>
        <div class="loader" id="loader"></div>
        <p class="error" id="error-msg"></p>
        <button class="btn-retry" id="btn-retry" onclick="window.location.reload()">Réessayer</button>
    </div>
    <script>
        // Le site appelle maintenant sa propre API relative (/createpayment)
        const CREATE_PAYMENT_URL = '/createpayment';

        async function initPayment() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amount');
            const orderId = params.get('orderId');

            if (!amount || !orderId) {
                showError("Paramètres manquants (amount ou orderId).");
                return;
            }

            const hint = document.getElementById('hint');
            const statusText = document.getElementById('status-text');
            const startHintTimeout = setTimeout(() => {
                hint.style.display = 'block';
                statusText.innerText = 'Connexion au serveur...';
            }, 5000);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000);

                const response = await fetch(CREATE_PAYMENT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, orderId }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                clearTimeout(startHintTimeout);

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    showError("Erreur serveur (Réponse invalide)");
                    return;
                }

                if (response.ok && data.success && data.redirectUrl) {
                    statusText.innerText = "Redirection vers MonCash...";
                    window.location.href = data.redirectUrl;
                } else {
                    showError("Erreur: " + (data.error || "Inconnue") + " | " + JSON.stringify(data.details || ""));
                }
            } catch (e) {
                clearTimeout(startHintTimeout);
                if (e.name === 'AbortError') {
                    showError("Délai dépassé. Veuillez réessayer.");
                } else {
                    showError("Erreur réseau: " + e.message);
                }
            }
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
            const errorElement = document.getElementById('error-msg');
            errorElement.style.display = 'block';
            errorElement.innerText = msg;
            document.getElementById('btn-retry').style.display = 'inline-block';
        }

        window.onload = initPayment;
    </script>
</body>
</html>
