<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Paiement MonCash Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2.5rem 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.05); text-align: center; max-width: 400px; width: 90%; }
        .logo-img { width: 100px; height: 100px; margin: 0 auto 1rem auto; display: block; border-radius: 50%; }
        .subtitle { color: #1a1a1a; font-size: .95rem; line-height: 1.6; margin-bottom: 1.5rem; font-weight: 500; }
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: #4a5568; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: #1A3B8E; outline: none; }
        .btn-pay { width: 100%; background-color: #1A3B8E; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: background 0.2s; }
        .btn-pay:hover { background-color: #12286b; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1A3B8E; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0) } 100% { transform: rotate(360deg) } }
        #status-text { color: #4a5568; font-size: 0.95rem; margin-top: 1rem; display: none; }
        .error { color: #e53e3e; background-color: #fff5f5; padding: 1rem; border-radius: 8px; display: none; margin-top: 1rem; font-weight: 600; border: 1px solid #feb2b2; font-size: .85rem; text-align: left; word-break: break-all; }
        .success { color: #2f855a; background-color: #f0fff4; padding: 1rem; border-radius: 8px; display: none; margin-top: 1rem; font-weight: 600; border: 1px solid #9ae6b4; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <img src="logo.png" alt="Logo PNH Infos Plus" class="logo-img">
        <p class="subtitle">Confirmation de paiement via MonCash Direct.</p>
        
        <div id="payment-form">
            <div class="input-group">
                <label for="phone">Numéro de téléphone MonCash</label>
                <input type="tel" id="phone" placeholder="Ex: 50937000000" maxlength="11">
            </div>
            <button class="btn-pay" onclick="startMerchantPayment()">Confirmer le paiement</button>
        </div>

        <div class="loader" id="loader"></div>
        <p id="status-text"></p>
        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>
    </div>

    <script>
        const CREATE_PAYMENT_URL = '/createpayment';

        async function startMerchantPayment() {
            let phone = document.getElementById('phone').value.trim();
            if (!phone) {
                alert("Veuillez saisir un numéro de téléphone.");
                return;
            }

            // Si le numéro a 8 chiffres, on ajoute automatiquement le préfixe 509
            if (phone.length === 8) {
                phone = "509" + phone;
            }

            if (phone.length < 11) {
                alert("Le numéro MonCash doit comporter 11 chiffres (ex: 50937000000).");
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amount');
            const orderId = params.get('orderId');

            if (!amount || !orderId) {
                alert("Paramètres de commande manquants.");
                return;
            }

            // UI Update
            document.getElementById('payment-form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const statusText = document.getElementById('status-text');
            statusText.style.display = 'block';
            statusText.innerText = "Initiation du paiement sur votre téléphone...";

            try {
                const response = await fetch(CREATE_PAYMENT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, orderId, account: phone })
                });

                const data = await response.json();
                document.getElementById('loader').style.display = 'none';

                if (response.ok && data.success) {
                    statusText.style.display = 'none';
                    const success = document.getElementById('success-msg');
                    success.style.display = 'block';
                    success.innerHTML = "Demande envoyée !<br>Veuillez confirmer sur votre téléphone en saisissant votre code PIN MonCash.<br><br>Statut: " + data.status;
                } else {
                    const errorDetails = data.details ? JSON.stringify(data.details) : "";
                    showError((data.error || "Une erreur est survenue.") + " " + errorDetails);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                showError("Erreur réseau: " + e.message);
            }
        }

        function showError(msg) {
            const err = document.getElementById('error-msg');
            err.style.display = 'block';
            err.innerText = msg;
            document.getElementById('payment-form').style.display = 'block';
            document.getElementById('status-text').style.display = 'none';
        }
    </script>
</body>
</html>
